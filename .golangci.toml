## golangci-lint v2 configuration for assay.
##
## Keep this list small and outcome-oriented: assay is a
## static-analysis library, not a sprawling service. Linters that
## generate noise on legitimate AST-walking patterns (gocognit,
## funlen, gocritic's hugeParam) are off by default; turn them on
## per-package if a specific quality problem motivates it.

version = "2"

[run]
timeout = "5m"
tests = true
modules-download-mode = "readonly"

# vendor/ and third_party/ are upstream code we don't lint.
# third_party/buildtools/build is bazelbuild's vendored parser;
# we wrap it but don't modify it.
[issues]
exclude-dirs = ["vendor", "third_party"]

[linters]
default = "standard"
enable = [
  "errcheck",
  "govet",
  "staticcheck",
  "unused",
  "ineffassign",
  "misspell",
  "unconvert",
  "unparam",
  "whitespace",
  "copyloopvar",
  "intrange",
  "gosec",
]

# Linters we deliberately don't run:
#   - wrapcheck: assay returns errors verbatim through library
#     boundaries on purpose. Wrapping policy is per-package.
#   - exhaustruct: report.* structs have many optional fields by
#     design (omitempty). Forcing every literal to fill every field
#     is noise.
#   - varnamelen: short receiver names (`v *visitor`) and short
#     local idents in tight AST-walk loops are deliberate.
#   - gocognit / funlen / gocyclo: AST visitor methods are
#     unavoidably long. Splitting them just for the linter hurts
#     readability.
disable = [
  "wrapcheck",
  "exhaustruct",
  "varnamelen",
  "gocognit",
  "funlen",
  "gocyclo",
]

[linters.settings.errcheck]
check-type-assertions = false
check-blank = false

[linters.settings.govet]
enable-all = true
# fieldalignment fights with the reports/ struct layouts that are
# tuned for readability (logical field grouping) over byte packing.
disable = ["fieldalignment"]

[linters.settings.misspell]
locale = "US"

[linters.settings.staticcheck]
# SA1019: deprecated-API warnings. We pull these in via go vet's
# staticcheck-equivalents already; suppressing here avoids the
# duplicate flag when a transitively-deprecated symbol leaks
# through go-bzlmod's API.
checks = ["all", "-SA1019"]

[linters.settings.gosec]
# G104 (errcheck duplicate), G115 (int conversion overflow — false
# positives on AST col/row int64 math) — both already covered by
# narrower checks or otherwise noisy in this codebase.
excludes = ["G104", "G115"]

[linters.exclusions]
generated = "lax"

# Test files get more rope — fixtures, table-driven loops, and
# helper closures legitimately repeat shapes that would trip
# golint-ier linters elsewhere.
[[linters.exclusions.rules]]
path = "_test\\.go"
linters = ["gosec", "errcheck"]

# third_party/ is bazelbuild's vendored buildtools parser. We wrap
# it but don't modify it. Lint findings here belong upstream.
[[linters.exclusions.rules]]
path = "third_party/"
linters = ["errcheck", "gosec", "govet", "ineffassign", "intrange", "misspell", "staticcheck", "unparam", "unused", "whitespace", "copyloopvar"]
